name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Lint
        run: ruff check src/ tests/ scripts/
      - name: Format check
        run: ruff format --check src/ tests/ scripts/

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  import-audit:
    name: Forbidden imports audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit src/ for forbidden imports
        shell: bash
        run: |
          set -euo pipefail
          # Per CLAUDE.md §2. Empty match -> success.
          pattern='(MultiheadAttention|scaled_dot_product_attention|xformers|flash_attn|^from transformers|^import transformers|apex)'
          if grep -rE "$pattern" src/; then
            echo "::error::Forbidden import found in src/ — see CLAUDE.md §2."
            exit 1
          fi
          echo "import audit OK"

  unit:
    name: Unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest (fast only)
        run: pytest -q -m "not slow"

  slow:
    name: Slow tests (oracles, resume)
    runs-on: ubuntu-latest
    # Slow suite gates releases, not PRs.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest (slow)
        run: pytest -q -m "slow"
